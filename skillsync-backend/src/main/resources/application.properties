# Server Configuration
server.port=8080

# H2 Database Configuration
# Using a file-based database so data persists across server restarts
spring.datasource.url=jdbc:h2:file:./data/skillsyncdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
# Automatically create/update the database schema based on our JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
# Wait for Hibernate to create tables before running data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# H2 Web Console Configuration
# Access via http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
